<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - DoorChef</title>
    <link rel="stylesheet" href="/DoorChef/css/contact.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <!-- Left: Logo -->
                <div class="nav-left">
                    <a href="/DoorChef/pages/index.html">
                        <img src="/DoorChef/Images/logo.png" alt="DoorChef Logo" class="logo">
                    </a>
                </div>
    
                <!-- Right: Menu + Cart -->
                <div class="nav-right">
                    <ul class="nav-links">
                        <li><a href="/DoorChef/pages/index.html">Home</a></li>
                        <li><a href="/DoorChef/pages/menu.html">Menu</a></li>
                    </ul>
                    <div class="cart-container">
                        <img src="/DoorChef/Images/cart icon.png" alt="Cart Icon" class="cart-icon">
                        <div class="cart-count">0</div>
                    </div>
                </div>
            </div>
        </nav>
    </header>
    
    <!-- Contact Section -->
    <section class="contact-section">
        <div class="contact-container">
            <!-- Left Section (Form) -->
            <div class="contact-form">
                <h2>Get in Touch</h2>
                <p>Have any questions? Send us a message and we’ll get back to you as soon as possible.</p>

                <form  action="https://api.web3forms.com/submit" method="POST" id="contact-form">
                    <input type="hidden" name="access_key" value="003e7593-0171-4c55-95eb-5d26976b6f1f">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>

                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="Write your message" required></textarea>

                    <button type="submit" class="contact-btn">Send Message</button>
                </form>

                <!-- Additional Info -->
                <div class="contact-info">
                    <div class="info-item">
                        <img src="/DoorChef/Images/clock icon.png" alt="Clock">
                        <span>Response in 24 hours</span>
                    </div>
                    <div class="info-item">
                        <img src="/DoorChef/Images/check icon.png" alt="Check">
                        <span>No commitment</span>
                    </div>
                </div>
            </div>

            <!-- Right Section (Image Grid) -->
            <div class="image-grid">
                <img src="/DoorChef/Images/Chef Cooking.jpg" alt="Chef Cooking">
                <img src="/DoorChef/Images/Plated Dish.jpg" alt="Plated Dish">
                <img src="/DoorChef/Images/Outdoor Dining.jpg" alt="Outdoor Dining">
                <img src="/DoorChef/Images/Gourmet Dish.jpg" alt="Gourmet Dish">
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2025 DoorChef. All Rights Reserved.</p>
    </footer>

</body>
</html>
